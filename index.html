<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    <link rel="stylesheet" href="css/style2.css">
</head>
<body>
    <h1>Sistema de Inventario</h1>

    <form action="/cadastrar" method="post">
            <input type="hidden" name="id" id="">
            <input type="text" name="nome" id="" placeholder="Digite o nome do Produto">
            <input type="text" name="quantidade" id="" placeholder="Digite a quantidade do Produto">
            <input type="text" name="preco_unitario" id="" placeholder="Digite o preço unitário do produto">
            <button class="btn-cadastrar" type="submit">Cadastrar</button>
    </form>

    <div>    
        <input type="text" id="inputBusca" placeholder="Procure por um produto pelo nome..." onkeyup="filtrarProdutos()">    
    </div>

    <table>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço Unitário</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="tabela-corpo">
        </tbody>
    </table>


    <script src="js/script.js"></script>
</body>
</html>
